<!DOCTYPE html>
<html lang="ja">
<head><title>課題情報の取得 | Backlog</title></head>
<body>
<div class="markdown">
<h1 id="課題情報の取得">課題情報の取得</h1>
<pre><code>GET /api/v2/issues/:issueIdOrKey
</code></pre>
<p>参加しているプロジェクトから課題の情報を取得します。</p>
<h2 id="実行可能な権限">実行可能な権限</h2>
<pre><code>すべての権限
</code></pre>
<h2 id="url-パラメーター">URL パラメーター</h2>
<table>
  <thead><tr><th>パラメーター名</th><th>型</th><th>内容</th></tr></thead>
  <tbody>
    <tr><td>issueIdOrKey</td><td>string</td><td>課題のIDまたは課題キー</td></tr>
  </tbody>
</table>
<h2 id="レスポンス">レスポンス</h2>
<table>
  <thead><tr><th>プロパティ名</th><th>型</th><th>内容</th></tr></thead>
  <tbody>
    <tr><td>id</td><td>number</td><td>課題ID</td></tr>
    <tr><td>summary</td><td>string</td><td>課題の件名</td></tr>
  </tbody>
</table>
</div>
</body>
</html>
