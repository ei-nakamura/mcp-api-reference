<!DOCTYPE html>
<html lang="ja">
<head><title>SmartHR API</title></head>
<body>
<div>
  <h2>部署の一覧</h2>
  <pre><code>GET /api/v1/departments</code></pre>
  <p>部署の一覧を取得します。</p>
  <h3>パラメーター</h3>
  <table>
    <thead>
      <tr><th>パラメーター名</th><th>型</th><th>必須</th><th>説明</th></tr>
    </thead>
    <tbody>
      <tr><td>page</td><td>integer</td><td></td><td>ページ番号</td></tr>
      <tr><td>code</td><td>string</td><td></td><td>部署コードでフィルタ</td></tr>
    </tbody>
  </table>
</div>
</body>
</html>
